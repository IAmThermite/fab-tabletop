name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tabletop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: tabletop

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3.1"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.11.1"
          cache: "npm"
          cache-dependency-path: tabletop/assets/package-lock.json

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            tabletop/deps
            tabletop/_build
          key: ${{ runner.os }}-mix-test-${{ hashFiles('tabletop/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-test-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Run asset tests
        run: mix test.assets

  lint:
    name: Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tabletop

    env:
      MIX_ENV: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3.1"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            tabletop/deps
            tabletop/_build
          key: ${{ runner.os }}-mix-dev-${{ hashFiles('tabletop/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-dev-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Check unused dependencies
        run: mix deps.unlock --check-unused
