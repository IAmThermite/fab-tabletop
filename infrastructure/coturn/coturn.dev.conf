# coturn local-dev config, mounted by docker-compose (host networking).
#
# Mirrors the production REST-API auth scheme so the same Tabletop.Turn
# credential code path is exercised locally. The dev secret here must match
# config/dev.exs (`config :tabletop, Tabletop.Turn, secret: "dev_turn_secret"`).

use-auth-secret
static-auth-secret=dev_turn_secret

realm=localhost

listening-port=3478

min-port=49160
max-port=49169

fingerprint
no-cli
no-multicast-peers

# Verbose logging is useful locally.
verbose
