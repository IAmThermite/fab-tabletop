# coturn production config (Fly.io).
#
# The auth secret and external IP are injected at container start by
# entrypoint.sh (via --static-auth-secret / --external-ip flags) so the secret
# is never baked into the image. Everything else lives here.

# TURN REST API: clients authenticate with time-limited HMAC credentials
# minted by the app (Tabletop.Turn). The shared secret is passed at runtime.
use-auth-secret

realm=fabtabletop.fly.dev

# STUN/TURN listener (TCP + UDP).
listening-port=3478
# TLS listener for turns: (cert provisioning is a later step; harmless if unused).
tls-listening-port=5349

# Relay port range handed out for UDP media. Kept deliberately small because
# Fly.io exposes UDP per-port — every port here must be published in fly.toml.
# 10 ports is plenty for a beta (≈1 relay port per allocation); widen both here
# and in fly.toml together if you need more concurrency.
min-port=49160
max-port=49169

fingerprint
no-cli
no-multicast-peers
# Don't relay to loopback / private ranges from the public internet.
no-loopback-peers

# --- Abuse / cost guards (a bug or abuse can't run up the Fly bandwidth bill) ---
# Max simultaneous allocations across the whole server.
total-quota=200
# Max simultaneous allocations per user.
user-quota=6
# Per-allocation bandwidth cap (bytes/sec). 0 = unlimited; cap to ~1MB/s.
max-bps=1000000

# Quieter logs in prod.
no-stdout-log
simple-log
