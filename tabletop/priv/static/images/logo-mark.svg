<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="FaBTabletop">
  <!-- outer silver ring (no filled background) -->
  <circle cx="32" cy="32" r="31" fill="none" stroke="#565b65" stroke-width="1"/>
  <circle cx="32" cy="32" r="28.75" fill="none" stroke="#c2c7cf" stroke-width="4.5"/>
  <circle cx="32" cy="32" r="26.5" fill="none" stroke="#565b65" stroke-width="1"/>

  <!-- three flat pitch gems, each with a flat silver ring -->
  <g stroke="#565b65" stroke-width="1">
    <circle cx="32"   cy="21"   r="10" fill="#c2c7cf"/>
    <circle cx="21.5" cy="39.5" r="10" fill="#c2c7cf"/>
    <circle cx="42.5" cy="39.5" r="10" fill="#c2c7cf"/>
  </g>
  <g stroke="#000000" stroke-opacity="0.22" stroke-width="0.6">
    <circle cx="32"   cy="21"   r="7.5" fill="#df4a3b"/>
    <circle cx="21.5" cy="39.5" r="7.5" fill="#e9b23c"/>
    <circle cx="42.5" cy="39.5" r="7.5" fill="#3f80d6"/>
  </g>
</svg>
